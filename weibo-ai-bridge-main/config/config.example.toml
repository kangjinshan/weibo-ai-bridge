# Weibo AI Bridge 配置文件示例
# 复制此文件为 config.toml 并填入实际配置

[platform.weibo]
# 微博应用 ID（必填）
# 从微博开放平台获取
app_id = "5288006887407627"

# 微博应用密钥（必填）
# 从微博开放平台获取
app_Secret = "a247bbc408e08e81e08f1baabcae7ae42cf4e4c9d9d30a4c9e6d8402200cb2d5"

# WebSocket Token 获取地址（可选，默认值）
token_url = "http://open-im.api.weibo.com/open/auth/ws_token"

# WebSocket 连接地址（可选，默认值）
ws_url = "ws://open-im.api.weibo.com/ws/stream"

# 请求超时时间（秒）
timeout = 30

# 服务器监听端口（可选，默认值）
server_port = "5533"

[agent.claude]
# Claude API Key 和模型配置请在 Claude Code 配置中设置
# 配置文件位置：~/.config/claude/config.json
# 或通过环境变量设置：export ANTHROPIC_API_KEY="sk-ant-xxxxx"

# 是否启用 Claude Agent
enabled = true

[agent.codex]
# Codex API Key（启用 Codex 时必填）
api_key = "your-codex-api-key"

# Codex 模型
model = "gpt-4"

# 是否启用 Codex Agent
enabled = false

[session]
# 会话超时时间（秒）
timeout = 3600

# 最大会话数量
max_size = 1000

[log]
# 日志级别: debug, info, warn, error
level = "info"

# 日志格式: json, text
format = "json"

# 日志输出: stdout, stderr, 或文件路径
output = "stdout"